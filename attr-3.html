<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>폼 선택자</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        a{
            color: #333;
            text-decoration: none;
        }
        ul, li{
            list-style: none;
        }
        input[type="text"]{
            border: 1px solid #ccc;
        }
        input[type="password"]{
            border: 1px solid #c08e8e;
        }
        input[required]{
            background-color: skyblue;
        }
        input[readonly]{
            border: none;
        }
    </style>
</head>
<body>
    <ul>
        <li>
          <label for="userid">아이디</label>
          <input id="userid" name="userid" type="text" required autofocus>
        </li>
        <li>
          <label for="pwd1">비밀번호</label>
          <input id="pwd1" name="pwd1" type="password"  required>
        </li>
        <li>
          <label for="pwd2">비밀번호 확인</label>
          <input id="pwd2" name="pwd2" type="password" required>
        </li>  
        <li>
          <label for="level">회원 등급</label>
          <input id="level" name="level" type="text" readonly value="준회원">
        </li>
      </ul>
</body>
</html>
