<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급선택자</title>
    <style>
        section{
            width: 600px;
            margin: 20px auto;
            background-color: beige;
        }
        /* section 안에 있는 모든 p */
        section p{
            color: blue;
        }
        /* section 안에 있는 자식 p */
        section>p{
            color: red;
        }
    </style>
</head>
<body>
    <section>
    <h1>예약 방법 & 사용 요금</h1>
    <p>아직 온라인 예약 신청이 준비되어 있지 않습니다. <br>전화(xxx-xxxx-xxxx)로 문의 바랍니다.</p>
    <div>
      <p>가족실(2~4인) : 60,000원/일</p>
      <p>도미토리(4인 공용) : 25,000원/일</p>
      </div>
  </section>   
</body>
</html>
